<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AI Profit Garden — Tool Library</title>
<meta name="description" content="The AI Profit Garden tool library — 102 simple, faith-led business tools to help you grow a flourishing business." />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Nunito+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
:root{
  --olive:#2F4A33;--olive-deep:#22351F;--sage:#7BA68A;--sage-soft:#E4EEE6;
  --gold:#C2954A;--gold-soft:#F3E6CF;--cream:#FBFAF6;--ink:#2C2C28;
  --paper:#FFFFFF;--line:#E7E3D8;--muted:#6E6E64;--danger:#B4543A;--danger-soft:#F6E3DC;
  --ring:rgba(123,166,138,.45);
  --serif:'Fraunces',Georgia,'Times New Roman',serif;
  --sans:'Nunito Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  --radius:14px;--radius-lg:22px;--radius-sm:10px;
  --shadow:0 6px 22px rgba(47,74,51,.08);--shadow-lg:0 16px 40px rgba(47,74,51,.14);--maxw:1040px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{-webkit-text-size-adjust:100%;scroll-behavior:smooth}
body{font-family:var(--sans);color:var(--ink);background:var(--cream);line-height:1.6;-webkit-font-smoothing:antialiased}
body::before{content:"";position:fixed;inset:0;z-index:-1;pointer-events:none;
  background:radial-gradient(900px 480px at 100% -5%,rgba(123,166,138,.16),transparent 60%),radial-gradient(820px 460px at -10% 8%,rgba(194,149,74,.10),transparent 55%)}
.wrap{max-width:var(--maxw);margin:0 auto;padding:20px 18px 80px}
a{color:inherit;text-decoration:none}
:focus-visible{outline:3px solid var(--ring);outline-offset:2px;border-radius:6px}

/* Header */
.app-header{position:relative;overflow:hidden;background:linear-gradient(135deg,var(--olive) 0%,var(--olive-deep) 100%);color:#F3F1E7;border-radius:var(--radius-lg);padding:34px 28px;box-shadow:var(--shadow);display:flex;align-items:center;gap:18px}
.app-header::after{content:"";position:absolute;top:-70px;right:-60px;width:240px;height:240px;background:radial-gradient(circle,rgba(194,149,74,.34),transparent 68%);pointer-events:none}
.brandmark{flex:0 0 auto;width:58px;height:58px;display:grid;place-items:center;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);border-radius:50%}
.brandmark svg{width:38px;height:38px;display:block}
.app-titles{position:relative;z-index:1;min-width:0}
.app-eyebrow{font-weight:700;letter-spacing:.16em;text-transform:uppercase;font-size:.7rem;color:var(--gold-soft);margin-bottom:4px}
.app-title{font-family:var(--serif);font-weight:600;font-size:2rem;line-height:1.12;color:#fff}
.app-sub{font-size:.98rem;color:rgba(243,241,231,.85);margin-top:6px;max-width:60ch}

/* Search + controls */
.controls{margin-top:18px;display:flex;flex-direction:column;gap:12px}
.search{position:relative}
.search input{width:100%;font-family:inherit;font-size:1rem;color:var(--ink);background:var(--paper);border:1.5px solid var(--line);border-radius:999px;padding:14px 18px 14px 46px;box-shadow:var(--shadow)}
.search input:focus{outline:none;border-color:var(--sage);box-shadow:0 0 0 3px var(--ring)}
.search svg{position:absolute;left:17px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--muted)}
.chips{display:flex;flex-wrap:wrap;gap:8px}
.chip{font-family:inherit;font-size:.82rem;font-weight:700;cursor:pointer;border:1.5px solid var(--line);background:var(--paper);color:var(--ink);padding:8px 14px;border-radius:999px;transition:.15s;-webkit-tap-highlight-color:transparent}
.chip:hover{border-color:var(--sage);background:var(--sage-soft)}
.chip.active{background:var(--olive);border-color:var(--olive);color:#fff}
.count{color:var(--muted);font-size:.85rem;padding-left:4px}

/* Category sections */
.cat{margin-top:34px}
.cat-head{display:flex;align-items:baseline;gap:10px;margin-bottom:4px}
.cat-letter{font-family:var(--serif);font-weight:700;font-size:1rem;color:#fff;background:var(--gold);width:30px;height:30px;border-radius:50%;display:inline-grid;place-items:center;flex:0 0 auto}
.cat-title{font-family:var(--serif);font-weight:600;font-size:1.35rem;color:var(--olive)}
.cat-note{color:var(--muted);font-size:.9rem;margin:2px 0 14px 40px}

/* App grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(248px,1fr));gap:14px}
.tile{display:flex;flex-direction:column;gap:6px;background:var(--paper);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 17px;transition:transform .1s,box-shadow .15s,border-color .15s;position:relative}
.tile:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg);border-color:var(--sage)}
.tile .num{font-size:.7rem;font-weight:700;letter-spacing:.06em;color:var(--gold);text-transform:uppercase}
.tile h3{font-family:var(--serif);font-weight:600;font-size:1.06rem;color:var(--ink);line-height:1.2}
.tile p{font-size:.86rem;color:var(--muted);line-height:1.45}
.tile .go{margin-top:auto;font-size:.8rem;font-weight:700;color:var(--olive);display:inline-flex;align-items:center;gap:5px;padding-top:6px}
.tile::after{content:"";position:absolute;inset:0;border-radius:var(--radius)}

/* No results */
.empty{text-align:center;color:var(--muted);padding:50px 14px;display:none}
.empty .ico{font-size:2rem;display:block;margin-bottom:10px;opacity:.6}

/* Footer */
.app-footer{text-align:center;margin-top:48px;padding-top:24px;border-top:1px solid var(--line);color:var(--muted);font-size:.88rem}
.app-footer .leaf{color:var(--sage);font-weight:700}
.app-footer .tag{font-family:var(--serif);color:var(--olive);font-style:italic;font-size:1.05rem}

@media (max-width:560px){
  .app-header{flex-direction:column;text-align:center;padding:28px 22px}
  .app-title{font-size:1.6rem}
  .cat-note{margin-left:0}
}
</style>
</head>
<body>

        <path d="M16 29C16 21 16 13 19 7" stroke="#E4EEE6" stroke-width="1.7" stroke-linecap="round"/>
        <g fill="#9FC5AC">

          <ellipse cx="12.6" cy="14.5" rx="3" ry="1.6" transform="rotate(-30 12.6 14.5)"/>

    <div class="app-titles">

</div>

      [45,"Simple Sales Pipeline","A clear view of every deal in progress.","simple-sales-pipeline.html"],

    ]},
    {k:"F",t:"AI Implementation & Productivity",n:"Let AI do the busywork, gently.",apps:[
      [51,"AI Starter Roadmap","Your personal step-by-step AI plan.","ai-starter-roadmap.html"],
      [52,"AI Tool Matchmaker","Get the right kind of AI tool for your problem.","ai-tool-matchmaker.html"],

      [55,"AI ROI Calculator","See the time and money an AI workflow saves.","ai-roi-calculator.html"],

    ]},

      [80,"Re-Engagement Campaign Builder","Wake up your quiet email list.","re-engagement-campaign-builder.html"]
    ]},
    {k:"I",t:"KPIs & Decision-Making",n:"Make the next right decision with clarity.",apps:[
      [81,"Industry KPI Dashboard","Track the numbers that matter in your industry.","industry-kpi-dashboard.html"],

      [86,"Should I Buy It? Checker","Run any purchase through a profit test.","should-i-buy-it-checker.html"],
      [87,"Capacity Calculator","How much you can take on before burnout.","capacity-calculator.html"],
      [88,"Growth Readiness Quiz","Find out if you're ready to scale.","growth-readiness-quiz.html"],
      [89,"Quarterly Review Builder","Run a focused 90-day review in under an hour.","quarterly-review-builder.html"],

    ]},
    {k:"J",t:"Kingdom Wealth — Faith, Mindset & Family",n:"Grow from a place of peace, rooted and well-watered.",apps:[
      [91,"Faith & Business Devotional","A short daily Scripture and reflection.","faith-and-business-devotional.html"],

      [98,"Daily Mindset Boost","A grounded, encouraging word to start your day.","daily-mindset-boost.html"],

      [100,"Stress Reset Tool","A 2-minute guided pause when it's all too much.","stress-reset-tool.html"],

      [102,"Personality & Communication Helper","Understand others and respond with grace.","personality-and-communication-helper.html"]
    ]}
  ];

  var catsEl=document.getElementById("cats"),
      chipsEl=document.getElementById("chips"),
      qEl=document.getElementById("q"),
      countEl=document.getElementById("count"),
      emptyEl=document.getElementById("empty");
  var activeCat="all", query="";

  function esc(s){return String(s).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]})}

  // build chips
  var chipData=[["all","All 102"]].concat(CATS.map(function(c){return [c.k,c.k+" · "+c.t.split(" — ")[0]]}));
  chipsEl.innerHTML=chipData.map(function(c,i){
    return '<button class="chip'+(i===0?' active':'')+'" data-cat="'+c[0]+'" role="tab">'+esc(c[1])+'</button>';
  }).join("");

  // build sections
  catsEl.innerHTML=CATS.map(function(c){
    var tiles=c.apps.map(function(a){
      return '<a class="tile" href="'+a[3]+'" data-name="'+esc((a[1]+" "+a[2]).toLowerCase())+'">'+
        '<span class="num">#'+a[0]+'</span>'+
        '<h3>'+esc(a[1])+'</h3>'+
        '<p>'+esc(a[2])+'</p>'+
        '<span class="go">Open tool →</span>'+
      '</a>';
    }).join("");
    return '<section class="cat" data-cat="'+c.k+'">'+
      '<div class="cat-head"><span class="cat-letter">'+c.k+'</span><h2 class="cat-title">'+esc(c.t)+'</h2></div>'+
      '<p class="cat-note">'+esc(c.n)+'</p>'+
      '<div class="grid">'+tiles+'</div>'+
    '</section>';
  }).join("");

  function apply(){
    var q=query.trim().toLowerCase();
    var shown=0;
    CATS.forEach(function(c){
      var sec=catsEl.querySelector('.cat[data-cat="'+c.k+'"]');
      var catOk=(activeCat==="all"||activeCat===c.k);
      var anyVisible=false;
      sec.querySelectorAll(".tile").forEach(function(t){
        var match=catOk && (q===""||t.getAttribute("data-name").indexOf(q)>-1);
        t.style.display=match?"":"none";
        if(match){anyVisible=true;shown++}
      });
      sec.style.display=anyVisible?"":"none";
    });
    countEl.textContent=shown+(shown===1?" tool":" tools")+(q||activeCat!=="all"?" found":" in your garden");
    emptyEl.style.display=shown?"none":"block";
  }

  chipsEl.addEventListener("click",function(e){
    var b=e.target.closest(".chip"); if(!b)return;
    activeCat=b.getAttribute("data-cat");
    chipsEl.querySelectorAll(".chip").forEach(function(x){x.classList.toggle("active",x===b)});
    apply();
    if(activeCat!=="all"){var sec=catsEl.querySelector('.cat[data-cat="'+activeCat+'"]');if(sec)window.scrollTo({top:0});}
  });
  qEl.addEventListener("input",function(){query=qEl.value;if(query)
    {activeCat="all";chipsEl.querySelectorAll(".chip").forEach(function(x){x.classList.toggle("active",x.getAttribute("data-cat")==="all")});}
    apply();});

  apply();
})();
</script>
</body>
